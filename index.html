<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Optimized 3D Auto-Join Multiplayer</title>
    <style>
        html, body { margin: 0; height: 100%; overflow: hidden; background-color: #87CEEB; touch-action: none; overscroll-behavior: none; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }

        /* UI Overlay */
        #ui { position: absolute; top: max(10px, env(safe-area-inset-top)); left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; pointer-events: none; z-index: 10; }
        #ui .hint { font-size: 12px; margin-top: 5px; opacity: 0.85; }

        /* Control Zones */
        #joystick-zone {
            position: absolute;
            bottom: max(10%, env(safe-area-inset-bottom));
            left: 5%;
            width: 130px; height: 130px;
            z-index: 5;
            /* zone itself is invisible/oversized hit-area; visuals are separate so the
               knob can be drawn at the exact touch point even near the zone edge */
        }
        #joystick-base {
            position: absolute;
            width: 120px; height: 120px;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            pointer-events: none;
        }
        #joystick-knob {
            position: absolute;
            top: 50%; left: 50%;
            width: 54px; height: 54px;
            background: rgba(255,255,255,0.55);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            box-shadow: 0 0 10px rgba(0,0,0,0.25);
        }

        #jump-zone {
            position: absolute;
            right: max(6%, env(safe-area-inset-right));
            bottom: max(12%, env(safe-area-inset-bottom));
            width: 84px; height: 84px;
            border-radius: 50%;
            background: rgba(255,235,59,0.25);
            border: 2px solid rgba(255,235,59,0.6);
            z-index: 6;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: bold; font-size: 13px; letter-spacing: 0.05em;
            -webkit-user-select: none; user-select: none;
        }
        #jump-zone.pressed { background: rgba(255,235,59,0.5); transform: scale(0.92); }

        /* Camera drag zone covers the WHOLE screen and sits BELOW the joystick/jump
           zones in z-index. Touches are filtered by checking touch.target, so the
           joystick and jump button never leak input into camera rotation, and a
           drag started on empty screen can move anywhere (even briefly crossing
           over those areas) without snapping or being stolen. */
        #camera-zone { position: absolute; inset: 0; z-index: 4; }

        #status-row { display: flex; align-items: center; gap: 6px; }
        #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ffeb3b; box-shadow: 0 0 6px #ffeb3b; }
        #status-dot.online { background: #4CAF50; box-shadow: 0 0 6px #4CAF50; }
        #status-dot.offline { background: #ff5252; box-shadow: 0 0 6px #ff5252; }

        #toast {
            position: absolute;
            top: 46%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            z-index: 11;
            max-width: 80vw;
            text-align: center;
        }
        #toast.show { opacity: 1; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>

    <div id="ui">
        <div id="status-row"><span id="status-dot"></span><span id="status">Connecting...</span></div>
        <div class="hint">Left: joystick move | Anywhere: drag to look | Right button: jump</div>
    </div>

    <div id="toast"></div>

    <div id="camera-zone"></div>
    <div id="joystick-zone"><div id="joystick-base"></div><div id="joystick-knob"></div></div>
    <div id="jump-zone">JUMP</div>

    <script>
        // ==========================================
        // 1. THREE.JS ENVIRONMENT SETUP
        // ==========================================
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 15, 70);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
        dirLight.position.set(15, 25, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(1024, 1024);
        dirLight.shadow.camera.left = -40;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 40;
        dirLight.shadow.camera.bottom = -40;
        scene.add(dirLight);

        // Ground
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x6fae5e, roughness: 0.95 });
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(200, 50, 0x000000, 0x000000);
        grid.material.opacity = 0.08;
        grid.material.transparent = true;
        scene.add(grid);

        // ==========================================
        // WORLD — a few platforms to jump between, so
        // "make world cool" has something to climb on.
        // ==========================================
        const platforms = []; // { mesh, halfW, halfD, topY }

        function addPlatform(x, y, z, w, d, h, color) {
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8 });
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            platforms.push({ mesh, halfW: w / 2, halfD: d / 2, topY: y + h / 2 });
        }

        addPlatform(6, 1, -4, 4, 4, 2, 0xe0a458);
        addPlatform(11, 2.2, -7, 3.5, 3.5, 2, 0xd98c3f);
        addPlatform(15, 3.6, -3, 3, 3, 2, 0xe0a458);
        addPlatform(-7, 1.4, -6, 4, 4, 2, 0x7fb3d5);
        addPlatform(-12, 2.8, -2, 3.5, 3.5, 2, 0x5a9bc4);
        addPlatform(0, 4.6, -14, 5, 5, 2, 0xc46fb3);
        addPlatform(8, 1, 9, 4, 4, 2, 0x9bd56f);
        addPlatform(14, 1, 12, 4, 6, 2, 0x9bd56f);

        // A few simple low-poly trees for atmosphere
        function addTree(x, z) {
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.3, 1.6, 6), new THREE.MeshStandardMaterial({ color: 0x6b4a2f }));
            trunk.position.set(x, 0.8, z);
            trunk.castShadow = true;
            scene.add(trunk);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(1.1, 2.2, 8), new THREE.MeshStandardMaterial({ color: 0x3f8f4f }));
            leaves.position.set(x, 2.4, z);
            leaves.castShadow = true;
            scene.add(leaves);
        }
        for (let i = 0; i < 14; i++) {
            const a = Math.random() * Math.PI * 2;
            const r = 18 + Math.random() * 22;
            addTree(Math.cos(a) * r, Math.sin(a) * r);
        }

        // ==========================================
        // PLAYER MODEL & STATE
        // ==========================================
        const players = {}; // remote players: id -> { mesh, targetX, targetY, targetZ, targetYaw }
        // r128 (the Three.js build this page loads) has no CapsuleGeometry —
        // that constructor only exists from r142+. Build an equivalent capsule
        // shape ourselves: a cylinder body with a sphere cap on each end,
        // grouped into one object. Groups support .position/.rotation just
        // like a Mesh, so everything else in this file works unchanged.
        function makeCapsuleAvatar(color) {
            const mat = new THREE.MeshStandardMaterial({ color });
            const group = new THREE.Group();

            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1, 12), mat);
            body.castShadow = true;
            group.add(body);

            const topCap = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 8), mat);
            topCap.position.y = 0.5;
            topCap.castShadow = true;
            group.add(topCap);

            const bottomCap = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 8), mat);
            bottomCap.position.y = -0.5;
            bottomCap.castShadow = true;
            group.add(bottomCap);

            return group;
        }

        const myPlayer = makeCapsuleAvatar(0x00ff88);
        myPlayer.position.set(0, 1, 4);
        scene.add(myPlayer);

        let velocityY = 0;
        let onGround = true;
        const GRAVITY = -22;
        const JUMP_SPEED = 9;
        const GROUND_Y = 1; // capsule half-height rests at y=1 on flat ground

        scene.add(camera); // camera lives directly in world space — no pivot indirection,
                            // which was the source of the "doesn't follow me" bug: the old
                            // pivot's rotation + a lookAt() aimed at world-origin (0,1.4,0)
                            // meant the camera only looked correct near spawn and drifted
                            // off-target the moment you walked away.

        // ==========================================
        // 2. MOBILE CONTROLS — fixed for proper multi-touch
        // ==========================================
        const input = { x: 0, y: 0 };
        let camYaw = 0;
        let camPitch = -0.25;
        const CAM_DIST = 6.5;
        const CAM_HEIGHT = 1.4;     // vertical offset of the look-target above the player's feet
        const PITCH_MIN = -1.1, PITCH_MAX = 0.9;
        const camLookTarget = new THREE.Vector3();

        function updateCameraTransform(dt) {
            // Smoothly chase the player's position so camera motion stays steady even
            // if the player snaps slightly on landing/collision frames.
            const desiredTarget = new THREE.Vector3(
                myPlayer.position.x,
                myPlayer.position.y + CAM_HEIGHT,
                myPlayer.position.z
            );
            const smoothing = dt === undefined ? 1 : Math.min(1, dt * 14);
            camLookTarget.lerp(desiredTarget, smoothing);

            // Standard spherical orbit around the player: yaw rotates around Y,
            // pitch tilts the camera up/down, both measured from the live target.
            const horizDist = Math.cos(camPitch) * CAM_DIST;
            const height = Math.sin(camPitch) * CAM_DIST;

            camera.position.set(
                camLookTarget.x + horizDist * Math.sin(camYaw),
                camLookTarget.y + height,
                camLookTarget.z + horizDist * Math.cos(camYaw)
            );
            camera.lookAt(camLookTarget);
        }

        // ---------- Joystick: tracks its OWN touch identifier ----------
        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        let joyTouchId = null;
        let joyCenter = { x: 0, y: 0 };
        const JOY_RADIUS = 55;

        function resetJoystick() {
            joyTouchId = null;
            joyKnob.style.transform = `translate(-50%, -50%)`;
            input.x = 0; input.y = 0;
        }

        function moveJoystickKnob(touch) {
            let dx = touch.clientX - joyCenter.x;
            let dy = touch.clientY - joyCenter.y;
            const distance = Math.min(Math.sqrt(dx * dx + dy * dy), JOY_RADIUS);
            const angle = Math.atan2(dy, dx);
            const knobX = Math.cos(angle) * distance;
            const knobY = Math.sin(angle) * distance;
            joyKnob.style.transform = `translate(calc(-50% + ${knobX}px), calc(-50% + ${knobY}px))`;
            input.x = knobX / JOY_RADIUS;
            input.y = knobY / JOY_RADIUS;
        }

        joyZone.addEventListener('touchstart', (e) => {
            if (joyTouchId !== null) return; // already have a finger on the stick
            const t = e.changedTouches[0];
            const rect = joyZone.getBoundingClientRect();
            joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            joyTouchId = t.identifier;
            moveJoystickKnob(t);
            e.preventDefault();
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (joyTouchId === null) return;
            for (const t of e.changedTouches) {
                if (t.identifier === joyTouchId) { moveJoystickKnob(t); e.preventDefault(); }
            }
        }, { passive: false });

        function endJoystickTouch(e) {
            for (const t of e.changedTouches) {
                if (t.identifier === joyTouchId) resetJoystick();
            }
        }
        window.addEventListener('touchend', endJoystickTouch);
        window.addEventListener('touchcancel', endJoystickTouch);

        // Mouse fallback for desktop testing
        let joyMouseDown = false;
        joyZone.addEventListener('mousedown', (e) => {
            const rect = joyZone.getBoundingClientRect();
            joyCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            joyMouseDown = true;
            moveJoystickKnob(e);
        });
        window.addEventListener('mousemove', (e) => { if (joyMouseDown) moveJoystickKnob(e); });
        window.addEventListener('mouseup', () => { if (joyMouseDown) { joyMouseDown = false; resetJoystick(); } });

        // ---------- Jump button: tracks its OWN touch identifier ----------
        const jumpZone = document.getElementById('jump-zone');
        let jumpTouchId = null;
        let jumpRequested = false;

        function pressJump(e) {
            if (jumpTouchId !== null) return;
            jumpTouchId = e.changedTouches ? e.changedTouches[0].identifier : 'mouse';
            jumpRequested = true;
            jumpZone.classList.add('pressed');
            e.preventDefault();
            e.stopPropagation();
        }
        function releaseJump(e) {
            const id = e.changedTouches ? e.changedTouches[0].identifier : 'mouse';
            if (e.changedTouches) {
                for (const t of e.changedTouches) { if (t.identifier === jumpTouchId) jumpTouchId = null; }
            } else {
                jumpTouchId = null;
            }
            jumpZone.classList.remove('pressed');
        }
        jumpZone.addEventListener('touchstart', pressJump, { passive: false });
        jumpZone.addEventListener('touchend', releaseJump);
        jumpZone.addEventListener('touchcancel', releaseJump);
        jumpZone.addEventListener('mousedown', pressJump);
        jumpZone.addEventListener('mouseup', releaseJump);
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') jumpRequested = true; });

        // ---------- Camera drag: per-touch tracked, ignores joystick/jump touches ----------
        // Key fix vs. the reference: every touch is tracked by its OWN identifier in a
        // map, so starting a second finger, or replacing a lifted finger, never causes
        // the camera to snap using stale/wrong touch data. Touches that land on the
        // joystick or jump button are skipped here entirely (checked via elementFromPoint
        // equivalent: comparing target ancestry) so the two systems can never fight.
        const camZone = document.getElementById('camera-zone');
        const camTouches = {}; // identifier -> {x, y}

        function belongsToControl(target) {
            return joyZone.contains(target) || jumpZone.contains(target);
        }

        camZone.addEventListener('touchstart', (e) => {
            for (const t of e.changedTouches) {
                if (belongsToControl(t.target)) continue;
                camTouches[t.identifier] = { x: t.clientX, y: t.clientY };
            }
        }, { passive: true });

        camZone.addEventListener('touchmove', (e) => {
            let used = false;
            for (const t of e.changedTouches) {
                const prev = camTouches[t.identifier];
                if (!prev) continue;
                used = true;
                const deltaX = t.clientX - prev.x;
                const deltaY = t.clientY - prev.y;
                camYaw -= deltaX * 0.0065;
                camPitch -= deltaY * 0.0055;
                camPitch = Math.max(PITCH_MIN, Math.min(PITCH_MAX, camPitch));
                camTouches[t.identifier] = { x: t.clientX, y: t.clientY };
            }
            if (used) e.preventDefault();
        }, { passive: false });

        function clearCamTouch(e) {
            for (const t of e.changedTouches) delete camTouches[t.identifier];
        }
        camZone.addEventListener('touchend', clearCamTouch);
        camZone.addEventListener('touchcancel', clearCamTouch);

        // Mouse drag fallback (desktop) — ignore drags starting on the controls
        let mouseDragging = false;
        let lastMouse = { x: 0, y: 0 };
        camZone.addEventListener('mousedown', (e) => {
            if (belongsToControl(e.target)) return;
            mouseDragging = true;
            lastMouse = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('mousemove', (e) => {
            if (!mouseDragging) return;
            const deltaX = e.clientX - lastMouse.x;
            const deltaY = e.clientY - lastMouse.y;
            camYaw -= deltaX * 0.0065;
            camPitch -= deltaY * 0.0055;
            camPitch = Math.max(PITCH_MIN, Math.min(PITCH_MAX, camPitch));
            lastMouse = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('mouseup', () => { mouseDragging = false; });
        camZone.addEventListener('wheel', (e) => {
            // optional zoom via scroll on desktop, harmless on mobile (no wheel events there)
        }, { passive: true });

        // ==========================================
        // 3. OPTIMIZED AUTO-JOIN NETWORKING (HOST-RELAY)
        // ==========================================
        const GLOBAL_ROOM_ID = "awesome-mobile-game-room-1";
        let isHost = false;
        let hostConnection = null;
        let hostClients = [];
        let myId = null;

        let peer = new Peer(GLOBAL_ROOM_ID);

        const statusEl = document.getElementById('status');
        const statusDot = document.getElementById('status-dot');
        const toastEl = document.getElementById('toast');
        let toastTimer = null;
        function toast(msg) {
            toastEl.textContent = msg;
            toastEl.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
        }
        function setStatus(text, state) {
            statusEl.textContent = text;
            statusDot.className = state; // 'online' | 'offline' | ''
        }

        peer.on('open', (id) => {
            isHost = true;
            myId = id;
            setStatus('Hosting Global Game', 'online');
            toast('You opened the public room — others can join you now');
        });

        peer.on('error', (err) => {
            if (err && err.type === 'unavailable-id') {
                // Room exists! Become a client instead.
                peer = new Peer();
                peer.on('open', (id) => {
                    myId = id;
                    hostConnection = peer.connect(GLOBAL_ROOM_ID, { reliable: true });
                    setupClientNetworking();
                });
                peer.on('error', () => setStatus('Offline (solo mode)', 'offline'));
            } else if (!isHost) {
                setStatus('Offline (solo mode)', 'offline');
            }
        });

        // --- HOST LOGIC ---
        peer.on('connection', (conn) => {
            if (!isHost) return;
            hostClients.push(conn);

            conn.on('data', (data) => {
                if (!Array.isArray(data) || data.length < 3) return; // guard malformed packets
                const payload = [conn.peer, data[0], data[1], data[2]];
                updateRemotePlayer(payload);
                hostClients.forEach(c => {
                    if (c.peer !== conn.peer && c.open) c.send(payload);
                });
            });

            conn.on('close', () => {
                hostClients = hostClients.filter(c => c.peer !== conn.peer);
                if (players[conn.peer]) {
                    scene.remove(players[conn.peer].mesh);
                    delete players[conn.peer];
                }
            });
        });

        // --- CLIENT LOGIC ---
        function setupClientNetworking() {
            hostConnection.on('open', () => {
                setStatus('Joined Global Game', 'online');
                toast('Joined the public room');
            });
            hostConnection.on('data', (payload) => {
                if (!Array.isArray(payload) || payload.length < 4) return;
                updateRemotePlayer(payload);
            });
            hostConnection.on('close', () => {
                setStatus('Disconnected (solo mode)', 'offline');
            });
        }

        // ==========================================
        // 4. LERP & NETWORK TICK RATE
        // ==========================================
        const REMOTE_COLORS = [0xff5252, 0x5c8dff, 0xffb347, 0xb06fff, 0xff6fb0, 0x6fffe0];
        function colorForId(id) {
            let h = 0;
            for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) >>> 0;
            return REMOTE_COLORS[h % REMOTE_COLORS.length];
        }

        function updateRemotePlayer(data) {
            const id = data[0];
            if (!players[id]) {
                const mesh = makeCapsuleAvatar(colorForId(id));
                scene.add(mesh);
                players[id] = { mesh, targetX: data[1], targetY: data[2], targetZ: data[3], targetYaw: 0 };
            }
            // data layout: [id, x, y, z]  (yaw omitted from this tick for brevity/bandwidth;
            // facing direction is inferred from movement delta below for smoother visuals)
            const p = players[id];
            const dx = data[1] - p.targetX;
            const dz = data[3] - p.targetZ;
            if (Math.abs(dx) > 0.001 || Math.abs(dz) > 0.001) {
                p.targetYaw = Math.atan2(dx, dz);
            }
            p.targetX = data[1];
            p.targetY = data[2];
            p.targetZ = data[3];
        }

        let netTickAccum = 0;
        function networkTick(dt) {
            netTickAccum += dt;
            if (netTickAccum < 1 / 15) return;
            netTickAccum = 0;

            const packet = [
                Math.round(myPlayer.position.x * 100) / 100,
                Math.round(myPlayer.position.y * 100) / 100,
                Math.round(myPlayer.position.z * 100) / 100
            ];

            if (isHost) {
                const hostPayload = ['host', ...packet];
                hostClients.forEach(c => { if (c.open) c.send(hostPayload); });
            } else if (hostConnection && hostConnection.open) {
                hostConnection.send(packet);
            }
        }

        // ==========================================
        // 5. GAME LOOP & MOVEMENT (with gravity + platform collision)
        // ==========================================
        const speed = 6.5; // units/sec, frame-rate independent now (was 0.15/frame before)
        const clock = new THREE.Clock();

        function groundHeightAt(x, z) {
            // returns the highest surface at this x/z: either a platform top, or flat ground
            let best = 0; // flat ground level (capsule center rests at GROUND_Y above this)
            for (const p of platforms) {
                if (x > p.mesh.position.x - p.halfW && x < p.mesh.position.x + p.halfW &&
                    z > p.mesh.position.z - p.halfD && z < p.mesh.position.z + p.halfD) {
                    if (p.topY > best) best = p.topY;
                }
            }
            return best;
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(0.05, clock.getDelta());

            // Move player relative to camera yaw.
            // Forward/right vectors are derived the same way the camera computes
            // its own facing (see updateCameraTransform), so movement is
            // guaranteed to agree with what's actually on screen at every yaw —
            // the previous formula reused the camera's offset rotation directly,
            // which is the *opposite* of camera-forward, so strafing and
            // diagonal movement were mirrored left/right except at yaw 0/180.
            const mag = Math.min(1, Math.sqrt(input.x * input.x + input.y * input.y));
            if (mag > 0.05) {
                const forwardX = -Math.sin(camYaw), forwardZ = -Math.cos(camYaw); // away from camera
                const rightX = Math.cos(camYaw), rightZ = -Math.sin(camYaw);      // 90° clockwise from forward

                // joystick: input.y < 0 means "pushed up" -> move forward
                const moveX = rightX * input.x + forwardX * (-input.y);
                const moveZ = rightZ * input.x + forwardZ * (-input.y);

                myPlayer.position.x += moveX * speed * dt;
                myPlayer.position.z += moveZ * speed * dt;
                myPlayer.rotation.y = Math.atan2(moveX, moveZ);
            }

            // Jump + gravity
            if (jumpRequested) {
                if (onGround) { velocityY = JUMP_SPEED; onGround = false; }
                jumpRequested = false;
            }
            velocityY += GRAVITY * dt;
            myPlayer.position.y += velocityY * dt;

            const surfaceY = groundHeightAt(myPlayer.position.x, myPlayer.position.z) + GROUND_Y;
            if (myPlayer.position.y <= surfaceY) {
                myPlayer.position.y = surfaceY;
                velocityY = 0;
                onGround = true;
            }

            // fell off the world (shouldn't normally happen, but safe respawn)
            if (myPlayer.position.y < -20) {
                myPlayer.position.set(0, GROUND_Y, 4);
                velocityY = 0;
            }

            updateCameraTransform(dt);
            networkTick(dt);

            // LERP remote players toward their last known network state
            Object.values(players).forEach(p => {
                const t = Math.min(1, dt * 10);
                p.mesh.position.x += (p.targetX - p.mesh.position.x) * t;
                p.mesh.position.y += (p.targetY - p.mesh.position.y) * t;
                p.mesh.position.z += (p.targetZ - p.mesh.position.z) * t;
                let cur = p.mesh.rotation.y;
                let diff = p.targetYaw - cur;
                while (diff > Math.PI) diff -= Math.PI * 2;
                while (diff < -Math.PI) diff += Math.PI * 2;
                p.mesh.rotation.y = cur + diff * t;
            });

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        updateCameraTransform();
        animate();
    </script>
</body>
</html>
